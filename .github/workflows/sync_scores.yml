name: Sync Fantasy Scores

on:
  schedule:
    - cron: '*/1 * * * *'  
  workflow_dispatch:       

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Kric11 Scoring Engine
        run: |
          curl -s -X GET "${{ secrets.VERCEL_APP_URL }}/api/scoring/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
