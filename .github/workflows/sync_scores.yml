name: Sync Fantasy Scores

on:
  schedule:
    - cron: '*/1 * * * *'  # Every minute (free on GitHub Actions)
  workflow_dispatch:        # Manual trigger for testing

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Kric11 Scoring Engine
        run: |
          curl -s -X GET "${{ secrets.VERCEL_APP_URL }}/api/scoring/sync" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
