<div class="slide-in mt-2 flex flex-col items-center space-y-6">

            <span class="text-sm font-medium text-slate-600">SRH</span>

        <div class="text-center mt-5">

            <p class="text-[10px] text-slate-400 tracking-wider mt-0.5">7:30 PM IST · M. Chinnaswamy Stadium</p>
        </div>

    <!-- Logout -->
    <div class="pt-4">

            Sign out
