<div class="slide-in mt-2 flex flex-col items-center space-y-6">
    <!-- Welcome -->
    <div class="bg-white dark:bg-slate-900 rounded-3xl h-16 w-16 flex items-center justify-center shadow-sm border border-slate-100 dark:border-slate-800 transition-colors">
        <svg class="h-7 w-7 text-slate-400 dark:text-slate-500" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955a1.126 1.126 0 0 1 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
        </svg>
    </div>
    <div class="text-center">
        <h2 class="text-lg font-medium text-slate-700 dark:text-slate-100">Welcome, {{ username }}</h2>
        <p class="text-xs text-slate-400 dark:text-slate-500 font-medium tracking-wider mt-1">Fantasy Manager</p>
    </div>

    <!-- Contests List -->
    <div class="w-full max-w-sm space-y-4">
        <div class="flex items-center justify-between mb-2 px-2">
            <h3 class="text-sm font-semibold text-slate-800 dark:text-slate-200 tracking-wide">Available Contests</h3>
            <button hx-post="/web/create_test_contest" hx-target="this" hx-swap="outerHTML" class="text-xs text-indigo-500 font-medium hover:text-indigo-600 dark:text-indigo-400 dark:hover:text-indigo-300 transition-colors">
                + New Test
            </button>
        </div>

        {% for c in contests %}
        <button hx-post="/web/select_contest/{{ c.id }}" class="w-full bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 text-left hover:border-indigo-200 dark:hover:border-indigo-500/50 transition-colors focus:outline-none">
            <div class="flex justify-between items-center">
                <span class="text-sm font-bold text-slate-700 dark:text-slate-200">{{ c.t1_abbr }}</span>
                <div class="flex-1 mx-4 border-t border-dashed border-slate-200 dark:border-slate-800"></div>
                <span class="text-[10px] text-slate-400 dark:text-slate-500 font-medium tracking-wider uppercase">
                    {% if c.status == 'completed' %}
                        <span class="text-emerald-500 dark:text-emerald-400 font-bold">Ended</span>
                    {% else %}
                        Upcoming
                    {% endif %}
                </span>
                <div class="flex-1 mx-4 border-t border-dashed border-slate-200 dark:border-slate-800"></div>
                <span class="text-sm font-bold text-slate-700 dark:text-slate-200">{{ c.t2_abbr }}</span>
            </div>
            <div class="text-center mt-5">
                <p class="text-[11px] font-medium text-slate-500 dark:text-slate-400">{{ c.name }}</p>
                <p class="text-[10px] text-slate-400 dark:text-slate-500 tracking-wider mt-0.5">{{ c.match_date }} · {{ c.venue }}</p>
            </div>
            
            {% if c.active %}
            <!-- Active indicator -->
            <div class="absolute -top-2 -right-2">
                <span class="flex h-4 w-4">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-indigo-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-4 w-4 bg-indigo-500 border-2 border-white dark:border-slate-900 transition-colors"></span>
                </span>
            </div>
            {% endif %}
        </button>
        {% else %}
        <div class="bg-white dark:bg-slate-900 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-800 text-center transition-colors">
            <p class="text-sm text-slate-500 dark:text-slate-400">No contests available.</p>
        </div>
        {% endfor %}
    </div>

    <!-- Logout -->
    <div class="pt-4">
        <a href="/web/logout" class="text-xs text-slate-400 dark:text-slate-500 font-medium tracking-wider hover:text-slate-600 dark:hover:text-slate-300 transition-colors">
            Sign out
        </a>
    </div>
</div>
