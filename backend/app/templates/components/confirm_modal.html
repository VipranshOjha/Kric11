<!-- Confirmation Modal inserted via HTMX -->
<div id="confirmation-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm slide-in">
    <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl shadow-xl overflow-hidden border border-slate-100 dark:border-slate-800 flex flex-col max-h-[90vh]">
        <!-- Header -->
        <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between sticky top-0 bg-white dark:bg-slate-900 z-10">
            <h3 class="font-semibold text-slate-800 dark:text-slate-100 text-base">Confirm Your Squad</h3>
            <button onclick="document.getElementById('confirmation-modal').remove()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 rounded-full cursor-pointer">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Form Wrapper -->
        <form hx-post="/web/save_team" hx-target="#confirmation-modal" hx-swap="outerHTML" class="flex flex-col flex-1 overflow-hidden" 
              onsubmit="return document.querySelector('input[name=predicted_winner]:checked') != null;">
            <!-- Body -->
            <div class="p-6 overflow-y-auto w-full flex-1">
                <!-- C/VC Highlight -->
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <!-- Captain -->
                    <div class="bg-indigo-50 dark:bg-indigo-900/20 border border-indigo-100 dark:border-indigo-800/50 rounded-2xl p-4 flex flex-col items-center text-center">
                        <div class="h-10 w-10 bg-indigo-500 rounded-2xl flex items-center justify-center text-white font-bold text-sm mb-2 shadow-sm">C</div>
                        <p class="text-xs font-semibold text-slate-800 dark:text-slate-200 truncate w-full">{{ c_player.player_name }}</p>
                        <p class="text-[10px] text-indigo-500 font-medium tracking-wider uppercase mt-0.5">2x Points</p>
                    </div>
                    <!-- Vice Captain -->
                    <div class="bg-violet-50 dark:bg-violet-900/20 border border-violet-100 dark:border-violet-800/50 rounded-2xl p-4 flex flex-col items-center text-center">
                        <div class="h-10 w-10 bg-violet-400 rounded-2xl flex items-center justify-center text-white font-bold text-sm mb-2 shadow-sm">VC</div>
                        <p class="text-xs font-semibold text-slate-800 dark:text-slate-200 truncate w-full">{{ vc_player.player_name }}</p>
                        <p class="text-[10px] text-violet-500 font-medium tracking-wider uppercase mt-0.5">1.5x Points</p>
                    </div>
                </div>

                <!-- Full Roster List -->
                <h4 class="text-xs font-semibold text-slate-400 dark:text-slate-500 tracking-wider uppercase mb-3">Playing XI</h4>
                <div class="space-y-2 mb-6">
                    {% for p in players %}
                    <div class="flex items-center justify-between py-2 border-b border-slate-50 dark:border-slate-800/50 last:border-0">
                        <div class="flex items-center space-x-3">
                            <div class="h-7 w-7 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 flex items-center justify-center text-xs font-bold">
                                {{ p.player_name[0] }}
                            </div>
                            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ p.player_name }}</span>
                        </div>
                        <span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 uppercase tracking-wider">{{ p.role }}</span>
                    </div>
                    {% endfor %}
                </div>

                <!-- Prediction Section -->
                <h4 class="text-xs font-semibold text-slate-400 dark:text-slate-500 tracking-wider uppercase mb-3">Match Winner Prediction (+1 Pts)</h4>
                <div class="grid grid-cols-2 gap-3 mb-2">
                    <label class="cursor-pointer relative">
                        <input type="radio" name="predicted_winner" value="{{ contest.t1_id }}" class="peer sr-only" required>
                        <div class="rounded-xl border border-slate-200 dark:border-slate-800 p-3 text-center peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-900/30 peer-checked:border-indigo-500 dark:peer-checked:border-indigo-400 transition-all h-full flex items-center justify-center">
                            <span class="text-sm font-semibold text-slate-700 dark:text-slate-200">{{ contest.t1_abbr }}</span>
                        </div>
                    </label>
                    <label class="cursor-pointer relative">
                        <input type="radio" name="predicted_winner" value="{{ contest.t2_id }}" class="peer sr-only" required>
                        <div class="rounded-xl border border-slate-200 dark:border-slate-800 p-3 text-center peer-checked:bg-indigo-50 dark:peer-checked:bg-indigo-900/30 peer-checked:border-indigo-500 dark:peer-checked:border-indigo-400 transition-all h-full flex items-center justify-center">
                            <span class="text-sm font-semibold text-slate-700 dark:text-slate-200">{{ contest.t2_abbr }}</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Footer -->
            <div class="p-6 border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 sticky bottom-0 z-10 mt-auto">
                <button type="submit"
                    class="w-full bg-slate-800 dark:bg-indigo-600 text-white font-medium text-sm py-4 rounded-2xl shadow-sm hover:bg-slate-700 dark:hover:bg-indigo-500 active:scale-[0.98] transition-all duration-200 tracking-wider uppercase cursor-pointer">
                    Confirm & Lock Team
                </button>
            </div>
        </form>
    </div>
</div>
