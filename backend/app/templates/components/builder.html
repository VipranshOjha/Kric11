<div id="builder-container" class="slide-in">
    <!-- Pinned Stats -->
    <div id="stats-panel" class="flex items-center justify-between py-3 mb-4 border-b border-slate-100">
        <div class="text-center flex-1">
            <p class="text-[10px] text-slate-400 font-medium tracking-wider uppercase mb-1">Players</p>
            <p class="text-xl font-semibold {% if count == 12 %}text-emerald-600{% else %}text-slate-700{% endif %}">
                {{ count }}<span class="text-sm font-normal text-slate-300"> / 12</span>
            </p>
        </div>
        <div class="h-6 w-px bg-slate-100"></div>
        <div class="text-center flex-1">
            <p class="text-[10px] text-slate-400 font-medium tracking-wider uppercase mb-1">Credits Left</p>
            <p class="text-xl font-semibold {% if credits_left < 10 %}text-red-500{% elif credits_left < 25 %}text-amber-500{% else %}text-slate-700{% endif %}">
                {{ credits_left }}
            </p>
        </div>
        <div class="h-6 w-px bg-slate-100"></div>
        <div class="text-center flex-1">
            <p class="text-[10px] text-slate-400 font-medium tracking-wider uppercase mb-1">Budget</p>
            <p class="text-xl font-semibold text-slate-300">100</p>
        </div>
    </div>

    <!-- C/VC Status -->
    <div class="flex items-center justify-center space-x-4 mb-4 text-[10px] font-medium tracking-wider">
        <span class="flex items-center space-x-1.5">
            <span class="h-5 w-5 rounded-md flex items-center justify-center text-[9px] font-bold
                {% if captain_id %}bg-indigo-500 text-white{% else %}bg-slate-100 text-slate-300{% endif %}">C</span>
            <span class="{% if captain_id %}text-slate-600{% else %}text-slate-300{% endif %}">Captain (2x)</span>
        </span>
        <span class="text-slate-200">·</span>
        <span class="flex items-center space-x-1.5">
            <span class="h-5 w-5 rounded-md flex items-center justify-center text-[9px] font-bold
                {% if vc_id %}bg-violet-400 text-white{% else %}bg-slate-100 text-slate-300{% endif %}">VC</span>
            <span class="{% if vc_id %}text-slate-600{% else %}text-slate-300{% endif %}">Vice-Cap (1.5x)</span>
        </span>
    </div>

    <!-- Role Filter Tabs -->
    <div id="role-tabs" class="flex items-center space-x-2 mb-5 overflow-x-auto pb-1">
        <button onclick="filterRole('ALL')" data-role="ALL"
            class="role-tab active-tab px-4 py-2 rounded-2xl text-[11px] font-semibold tracking-wider uppercase transition-all duration-150 whitespace-nowrap
            bg-slate-800 text-white">
            All
        </button>
        <button onclick="filterRole('WK')" data-role="WK"
            class="role-tab px-4 py-2 rounded-2xl text-[11px] font-semibold tracking-wider uppercase transition-all duration-150 whitespace-nowrap
            bg-slate-50 text-slate-400 border border-slate-200 hover:bg-slate-100">
            WK
        </button>
        <button onclick="filterRole('BAT')" data-role="BAT"
            class="role-tab px-4 py-2 rounded-2xl text-[11px] font-semibold tracking-wider uppercase transition-all duration-150 whitespace-nowrap
            bg-slate-50 text-slate-400 border border-slate-200 hover:bg-slate-100">
            BAT
        </button>
        <button onclick="filterRole('AR')" data-role="AR"
            class="role-tab px-4 py-2 rounded-2xl text-[11px] font-semibold tracking-wider uppercase transition-all duration-150 whitespace-nowrap
            bg-slate-50 text-slate-400 border border-slate-200 hover:bg-slate-100">
            AR
        </button>
        <button onclick="filterRole('BOWL')" data-role="BOWL"
            class="role-tab px-4 py-2 rounded-2xl text-[11px] font-semibold tracking-wider uppercase transition-all duration-150 whitespace-nowrap
            bg-slate-50 text-slate-400 border border-slate-200 hover:bg-slate-100">
            BOWL
        </button>
    </div>

    <!-- Player Cards -->
    <div id="player-list" class="space-y-3">
        {% for p in players %}
            {% set is_selected = p.id in draft %}
            <div class="player-role-card" data-role="{{ p.role }}">
                {% include 'components/player_card.html' %}
            </div>
        {% endfor %}
    </div>

    <!-- Lock In -->
    <div id="save-status" class="mt-4"></div>
    <button hx-post="/web/save_team" hx-target="#save-status" hx-swap="outerHTML"
        class="w-full mt-4 py-4 rounded-2xl font-medium text-sm tracking-wider uppercase transition-all duration-200
        {% if count == 12 and captain_id and vc_id %}bg-slate-800 text-white hover:bg-slate-700{% else %}bg-slate-200 text-slate-400{% endif %}
        active:scale-[0.98] shadow-sm">
        Lock in roster
    </button>
</div>

<script>
function filterRole(role) {
    // Update tab styles
    document.querySelectorAll('.role-tab').forEach(function(tab) {
        if (tab.getAttribute('data-role') === role) {
            tab.className = 'role-tab active-tab px-4 py-2 rounded-2xl text-[11px] font-semibold tracking-wider uppercase transition-all duration-150 whitespace-nowrap bg-slate-800 text-white';
        } else {
            tab.className = 'role-tab px-4 py-2 rounded-2xl text-[11px] font-semibold tracking-wider uppercase transition-all duration-150 whitespace-nowrap bg-slate-50 text-slate-400 border border-slate-200 hover:bg-slate-100';
        }
    });
    // Show/hide player cards
    document.querySelectorAll('.player-role-card').forEach(function(card) {
        if (role === 'ALL' || card.getAttribute('data-role') === role) {
            card.style.display = '';
        } else {
            card.style.display = 'none';
        }
    });
    if(navigator.vibrate) navigator.vibrate(3);
}
</script>
