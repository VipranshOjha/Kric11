<!-- Opponent Roster Modal -->
<div id="opponent-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm slide-in">
    <div class="bg-white dark:bg-slate-900 w-full max-w-sm rounded-3xl shadow-xl overflow-hidden border border-slate-100 dark:border-slate-800 flex flex-col max-h-[90vh]">
        <!-- Header -->
        <div class="px-6 py-5 border-b border-slate-100 dark:border-slate-800 flex items-center justify-between sticky top-0 bg-white dark:bg-slate-900 z-10 text-center">
            <div class="flex-1">
                <h3 class="font-semibold text-slate-800 dark:text-slate-100 text-base">{{ opponent_username }}'s Squad</h3>
            </div>
            <button onclick="document.getElementById('opponent-modal').remove()" class="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 rounded-full cursor-pointer absolute right-6">
                <svg class="h-5 w-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- Body -->
        <div class="p-6 overflow-y-auto w-full flex-1">
            <!-- Roster List -->
            <div class="space-y-3">
                {% for p in players %}
                <div class="flex items-center justify-between p-3 rounded-2xl border border-slate-50 dark:border-slate-800/50 bg-slate-50/50 dark:bg-slate-800/20">
                    <div class="flex items-center space-x-3">
                        <div class="relative">
                            <div class="h-9 w-9 rounded-xl bg-white dark:bg-slate-800 text-slate-500 dark:text-slate-400 flex items-center justify-center text-xs font-bold border border-slate-100 dark:border-slate-700">
                                {{ p.name[0] }}
                            </div>
                            {% if p.is_captain %}
                            <div class="absolute -top-1.5 -right-1.5 h-4 w-4 bg-indigo-500 text-white text-[8px] font-bold rounded-md flex items-center justify-center border-2 border-white dark:border-slate-900">C</div>
                            {% elif p.is_vice_captain %}
                            <div class="absolute -top-1.5 -right-1.5 h-4 w-4 bg-violet-400 text-white text-[8px] font-bold rounded-md flex items-center justify-center border-2 border-white dark:border-slate-900">VC</div>
                            {% endif %}
                        </div>
                        <div>
                            <span class="text-sm font-medium text-slate-700 dark:text-slate-300">{{ p.name }}</span>
                            <div class="flex items-center space-x-2 mt-0.5">
                                <span class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-tighter">{{ p.team }}</span>
                                <span class="text-[9px] font-medium text-slate-300 dark:text-slate-600">•</span>
                                <span class="text-[9px] font-medium text-slate-400 dark:text-slate-500 uppercase tracking-wider">{{ p.role }}</span>
                            </div>
                        </div>
                    </div>
                </div>
                {% endfor %}
            </div>
        </div>

        <!-- Footer -->
        <div class="p-4 border-t border-slate-100 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 sticky bottom-0 z-10 text-center">
            <p class="text-[10px] text-slate-400 dark:text-slate-500 font-medium">Captain earns 2x points • Vice-Captain earns 1.5x points</p>
        </div>
    </div>
</div>
