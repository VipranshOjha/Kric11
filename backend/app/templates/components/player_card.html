<div id="player-card-{{ p.id }}" class="flex justify-between items-center p-3 sm:p-4 rounded-2xl transition-all duration-200 ease-out {% if is_selected %}bg-gradient-to-r from-sky-900/60 to-slate-800 border-l-4 border-sky-400 shadow-lg shadow-sky-900/20 transform scale-[1.01]{% else %}bg-slate-800/80 border border-slate-700/50 hover:bg-slate-700/80{% endif %}">
    <div class="flex items-center space-x-4">
        <div class="h-12 w-12 rounded-full flex items-center justify-center font-black text-xl shadow-inner {% if p.team == 'RCB' %}bg-gradient-to-br from-rose-900 to-rose-950 text-rose-300 border border-rose-800{% else %}bg-gradient-to-br from-orange-900 to-orange-950 text-orange-300 border border-orange-800{% endif %}">
            {{ p.name[0] }}
        </div>
        <div>
            <h3 class="font-bold text-slate-100 tracking-wide text-[15px] sm:text-base">{{ p.name }}</h3>
            <div class="flex items-center space-x-2 text-[10px] sm:text-xs font-bold text-slate-400 mt-1 uppercase tracking-wider">
                <span class="px-1.5 py-0.5 rounded {% if p.team == 'RCB' %}bg-rose-950 text-rose-300 border border-rose-900/50{% else %}bg-orange-950 text-orange-300 border border-orange-900/50{% endif %}">{{ p.team }}</span>
                <span class="text-slate-600">•</span>
                <span class="text-slate-300">{{ p.role }}</span>
                <span class="text-slate-600">•</span>
                <span class="text-sky-300">{{ p.credits }} CR</span>
            </div>
        </div>
    </div>
    
    <button hx-post="/web/toggle/{{ p.id }}" hx-target="#player-card-{{ p.id }}" hx-swap="outerHTML"
        class="haptic-btn h-10 w-10 flex items-center justify-center rounded-full font-black shadow-md transition-all {% if is_selected %}bg-rose-500/90 text-white hover:bg-rose-500 shadow-rose-500/30{% else %}bg-sky-500/90 text-white hover:bg-sky-500 shadow-sky-500/30{% endif %}">
        {% if is_selected %}
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M20 12H4"/></svg>
        {% else %}
            <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4"/></svg>
        {% endif %}
    </button>
</div>

<!-- OOB Update for Stats Panel -->
<div id="stats-panel" hx-swap-oob="true" class="bg-slate-800/95 p-4 rounded-2xl flex justify-between items-center shadow-xl shadow-slate-900/50 border border-slate-700/50 sticky top-4 z-40 mb-6 backdrop-blur-xl transition-all duration-300">
    <div class="text-center w-1/3">
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5 transition-colors">Players</p>
        <p class="text-2xl font-black {% if count == 12 %}text-emerald-400{% else %}text-white{% endif %} transition-colors">{{ count }}<span class="text-lg text-slate-500">/12</span></p>
    </div>
    
    <div class="h-10 w-px bg-slate-700/80 rounded-full"></div>

    <div class="text-center w-1/3">
        <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Credits</p>
        <p class="text-2xl font-black {% if credits_left < 0 %}text-rose-500{% else %}text-sky-400{% endif %} transition-colors">{{ credits_left|round(1) }}</p>
    </div>
</div>
