<!-- Player Card — Scandinavian Flat with C/VC selection -->
<div id="player-card-{{ p.id }}"
     class="bg-white dark:bg-slate-900 rounded-3xl p-4 transition-all duration-200 ease-out relative overflow-hidden
     {% if captain_id == p.id %}border-2 border-indigo-400 dark:border-indigo-500 shadow-md{% elif vc_id == p.id %}border-2 border-violet-300 dark:border-violet-500 shadow-md{% elif is_selected %}border-2 border-slate-600 dark:border-slate-500 shadow-sm{% else %}border border-slate-100 dark:border-slate-800 shadow-sm hover:shadow-md dark:hover:border-slate-700{% endif %}">
    
    <!-- Team Color Pill -->
    <div class="absolute left-0 top-0 bottom-0 w-1.5 team-bg-{{ p.team }}"></div>

    <div class="flex items-center justify-between">
        <div class="flex items-center space-x-4 flex-1 min-w-0 pl-1.5">
            <!-- Avatar with C/VC badge -->
            <div class="relative">
                <div class="h-10 w-10 rounded-2xl flex items-center justify-center font-medium text-sm flex-shrink-0
                    {% if captain_id == p.id %}bg-indigo-500 text-white{% elif vc_id == p.id %}bg-violet-400 text-white{% elif is_selected %}bg-slate-700 dark:bg-slate-600 text-white{% else %}bg-slate-50 dark:bg-slate-800 text-slate-500 dark:text-slate-400 border border-slate-100 dark:border-slate-700{% endif %} transition-all duration-200">
                    {% if captain_id == p.id %}C{% elif vc_id == p.id %}VC{% else %}{{ p.name[0] }}{% endif %}
                </div>
            </div>
            
            <!-- Player Info -->
            <div class="min-w-0">
                <h3 class="font-medium text-sm text-slate-800 dark:text-slate-200 truncate">{{ p.name }}</h3>
                <div class="flex items-center space-x-2 mt-0.5">
                    <span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 tracking-wider uppercase">{{ p.role }}</span>
                    <span class="text-slate-200 dark:text-slate-700">·</span>
                    <span class="text-[10px] font-medium text-slate-400 dark:text-slate-500 tracking-wider">{{ p.team }}</span>
                </div>
            </div>
        </div>

            <!-- Credit + Actions -->
        <div class="flex items-center space-x-2 flex-shrink-0 {% if match_started or roster_locked %}opacity-50 pointer-events-none{% endif %}">
            <div class="text-right mr-1">
                <p class="text-sm font-semibold text-slate-700 dark:text-slate-200">{{ p.credits }}</p>
                <p class="text-[9px] text-slate-300 dark:text-slate-600 font-medium tracking-wider uppercase">cr</p>
            </div>

            {% if is_selected %}
                <!-- C/VC buttons (only for selected players) -->
                <button hx-post="/web/set_role/{{ p.id }}/C" hx-target="#main-content" hx-swap="innerHTML"
                    class="h-7 w-7 flex items-center justify-center rounded-lg text-[10px] font-bold transition-all duration-150 active:scale-90
                    {% if captain_id == p.id %}bg-indigo-500 text-white{% else %}bg-slate-50 dark:bg-slate-800 text-slate-400 dark:text-slate-500 border border-slate-200 dark:border-slate-700 hover:bg-indigo-50 dark:hover:bg-indigo-900/40 hover:text-indigo-500 dark:hover:text-indigo-400 hover:border-indigo-200 dark:hover:border-indigo-700{% endif %}">
                    C
                </button>
                <button hx-post="/web/set_role/{{ p.id }}/VC" hx-target="#main-content" hx-swap="innerHTML"
                    class="h-7 w-7 flex items-center justify-center rounded-lg text-[9px] font-bold transition-all duration-150 active:scale-90
                    {% if vc_id == p.id %}bg-violet-400 text-white{% else %}bg-slate-50 dark:bg-slate-800 text-slate-400 dark:text-slate-500 border border-slate-200 dark:border-slate-700 hover:bg-violet-50 dark:hover:bg-violet-900/40 hover:text-violet-500 dark:hover:text-violet-400 hover:border-violet-200 dark:hover:border-violet-700{% endif %}">
                    VC
                </button>
            {% endif %}

            <!-- Select/Deselect -->
            <button hx-post="/web/toggle/{{ p.id }}" hx-target="#player-card-{{ p.id }}" hx-swap="outerHTML"
                class="h-8 w-8 flex items-center justify-center rounded-xl transition-all duration-150 active:scale-90
                {% if is_selected %}bg-slate-700 dark:bg-slate-600 text-white{% else %}bg-slate-50 dark:bg-slate-800 text-slate-400 dark:text-slate-500 border border-slate-200 dark:border-slate-700 hover:bg-slate-100 dark:hover:bg-slate-700{% endif %}">
                {% if is_selected %}
                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/>
                    </svg>
                {% else %}
                    <svg class="h-3.5 w-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
                    </svg>
                {% endif %}
            </button>
        </div>
    </div>
</div>

<!-- OOB Stats Panel -->
<div id="stats-panel" hx-swap-oob="true" class="flex items-center justify-between py-3 mb-6 border-b border-slate-100 dark:border-slate-800 transition-colors duration-300">
    <div class="text-center flex-1">
        <p class="text-[10px] text-slate-400 dark:text-slate-500 font-medium tracking-wider uppercase mb-1">Players</p>
        <p class="text-xl font-semibold {% if count == 12 %}text-emerald-600 dark:text-emerald-400{% else %}text-slate-700 dark:text-slate-200{% endif %} transition-colors">
            {{ count }}<span class="text-sm font-normal text-slate-300 dark:text-slate-600"> / 12</span>
        </p>
    </div>
    <div class="h-6 w-px bg-slate-100 dark:bg-slate-800"></div>
    <div class="text-center flex-1">
        <p class="text-[10px] text-slate-400 dark:text-slate-500 font-medium tracking-wider uppercase mb-1">Credits Left</p>
        <p class="text-xl font-semibold {% if credits_left < 10 %}text-red-500 dark:text-red-400{% elif credits_left < 25 %}text-amber-500 dark:text-amber-400{% else %}text-slate-700 dark:text-slate-200{% endif %} transition-colors">
            {{ credits_left }}
        </p>
    </div>
    <div class="h-6 w-px bg-slate-100 dark:bg-slate-800"></div>
    <div class="text-center flex-1">
        <p class="text-[10px] text-slate-400 dark:text-slate-500 font-medium tracking-wider uppercase mb-1">Budget</p>
        <p class="text-xl font-semibold text-slate-300 dark:text-slate-600">100</p>
    </div>
</div>

<style>
  .team-bg-CSK { background-color: #eab308; }
  .team-bg-MI { background-color: #0ea5e9; }
  .team-bg-RCB { background-color: #ef4444; }
  .team-bg-KKR { background-color: #a855f7; }
  .team-bg-SRH { background-color: #f97316; }
  .team-bg-DC { background-color: #3b82f6; }
  .team-bg-RR { background-color: #ec4899; }
  .team-bg-PBKS { background-color: #dc2626; }
  .team-bg-LSG { background-color: #14b8a6; }
  .team-bg-GT { background-color: #6366f1; }
</style>
