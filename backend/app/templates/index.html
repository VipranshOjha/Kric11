<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kric11</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .haptic-btn { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); }
        .haptic-btn:active { transform: scale(0.92); }
        .bottom-nav { background: rgba(30, 41, 59, 0.95); backdrop-filter: blur(10px); }
        .nav-item { transition: all 0.2s ease; }
        .nav-item.active { color: #38bdf8; transform: translateY(-3px); }
        .nav-item.active svg { stroke-width: 2.5; filter: drop-shadow(0 0 4px rgba(56, 189, 248, 0.5)); }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="selection:bg-sky-500/30">
    <!-- Header -->
    <header class="bg-slate-900/90 backdrop-blur-md p-5 sticky top-0 z-50 border-b border-slate-800 flex justify-between items-center shadow-lg">
        <div>
            <h1 class="text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-sky-400 to-indigo-500 tracking-tighter shadow-sm">KRIC11</h1>
            <p class="text-[10px] text-slate-400 uppercase font-bold tracking-widest mt-0.5">IPL 2026 Season</p>
        </div>
        <div class="bg-slate-800 border border-slate-700 rounded-full px-4 py-1.5 shadow-inner flex items-center">
            <span class="text-rose-500 font-bold text-sm tracking-wider">RCB</span>
            <span class="text-slate-500 text-xs mx-2 font-black">VS</span>
            <span class="text-orange-500 font-bold text-sm tracking-wider">SRH</span>
        </div>
    </header>

    <!-- Main Content Dynamic Container -->
    <main id="main-content" class="p-4" hx-get="/web/builder" hx-trigger="load">
        <!-- Spinner while loading -->
        <div class="flex items-center justify-center h-64">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-sky-500"></div>
        </div>
    </main>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav fixed bottom-0 w-full h-20 border-t border-slate-800 flex justify-around items-center px-4 z-50 pb-safe shadow-2xl">
        <button class="nav-item haptic-btn flex flex-col items-center justify-center text-slate-500 w-full" hx-get="/web/home_view" hx-target="#main-content">
            <svg class="h-6 w-6 mb-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
            <span class="text-[10px] font-bold tracking-wider">HOME</span>
        </button>
        <button class="nav-item active haptic-btn flex flex-col items-center justify-center text-sky-400 w-full" hx-get="/web/builder" hx-target="#main-content">
            <svg class="h-6 w-6 mb-1 transition-all filter drop-shadow-md" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>
            <span class="text-[10px] font-bold tracking-wider">TEAM</span>
        </button>
        <button class="nav-item haptic-btn flex flex-col items-center justify-center text-slate-500 w-full" hx-get="/web/leaderboard_view" hx-target="#main-content">
            <svg class="h-6 w-6 mb-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v8l9-11h-7z"/></svg>
            <span class="text-[10px] font-bold tracking-wider">BOARD</span>
        </button>
    </nav>
    <script>
        document.body.addEventListener('htmx:afterOnLoad', function() {
            if(navigator.vibrate) { navigator.vibrate(10); } 
        });
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', function() {
                if(navigator.vibrate) { navigator.vibrate(15); }
                document.querySelectorAll('.nav-item').forEach(b => {
                    b.classList.remove('active', 'text-sky-400');
                    b.classList.add('text-slate-500');
                    b.querySelector('svg').style.strokeWidth = "2";
                });
                this.classList.add('active', 'text-sky-400');
                this.classList.remove('text-slate-500');
                this.querySelector('svg').style.strokeWidth = "2.5";
            });
        });
    </script>
</body>
</html>
