<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kric11</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --border: #e2e8f0;
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-muted: #94a3b8;
            --accent: #64748b;
            --selected: #6b8f71;
            --selected-bg: #f0fdf4;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
        }
        .slide-in {
            animation: slideIn 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: slideIn 0.25s ease-out; }
    </style>
</head>
<body>

    <!-- Header — thin, functional -->
    <header class="bg-white/80 backdrop-blur-sm px-5 py-4 sticky top-0 z-50 border-b border-slate-100">
        <div class="max-w-lg mx-auto flex justify-between items-center">
            <div>
                <h1 class="text-lg font-light text-slate-800 tracking-wide">kric<span class="font-semibold">11</span></h1>
            </div>
            <div class="flex items-center space-x-3 text-xs font-medium text-slate-400 tracking-wider">
                <span class="text-slate-600">RCB</span>
                <span class="text-slate-300">·</span>
                <span class="text-slate-600">SRH</span>
            </div>
        </div>
    </header>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Main Content -->
    <main id="main-content" class="max-w-lg mx-auto px-5 py-6 pb-28" hx-get="/web/builder" hx-trigger="load">
        <div class="flex items-center justify-center h-48">
            <div class="animate-spin rounded-full h-6 w-6 border border-slate-200 border-t-slate-400"></div>
        </div>
    </main>

    <!-- Bottom Navigation — flat line-art -->
    <nav class="fixed bottom-0 w-full bg-white border-t border-slate-100 z-50">
        <div class="max-w-lg mx-auto flex justify-around items-center h-16 px-8">
            <button class="nav-item flex flex-col items-center justify-center space-y-1 text-slate-400 transition-colors duration-200 w-full" hx-get="/web/home_view" hx-target="#main-content">
                <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955a1.126 1.126 0 0 1 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/>
                </svg>
                <span class="text-[9px] font-medium tracking-wider uppercase">Home</span>
            </button>

            <button class="nav-item active flex flex-col items-center justify-center space-y-1 text-slate-800 transition-colors duration-200 w-full" hx-get="/web/builder" hx-target="#main-content">
                <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21 12.3 12.3 0 0 1 2.76 19.168l-.022-.019a4.125 4.125 0 0 1 6.787-4.674M15 16.058a9.337 9.337 0 0 0-4.121-.952c-.946 0-1.86.14-2.725.4"/>
                    <circle cx="9.75" cy="6.75" r="3.75"/>
                    <circle cx="15" cy="8.25" r="2.25"/>
                </svg>
                <span class="text-[9px] font-medium tracking-wider uppercase">Draft</span>
            </button>

            <button class="nav-item flex flex-col items-center justify-center space-y-1 text-slate-400 transition-colors duration-200 w-full" hx-get="/web/leaderboard_view" hx-target="#main-content">
                <svg class="h-[18px] w-[18px]" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 13.125C3 12.504 3.504 12 4.125 12h2.25c.621 0 1.125.504 1.125 1.125v6.75C7.5 20.496 6.996 21 6.375 21h-2.25A1.125 1.125 0 0 1 3 19.875v-6.75ZM9.75 8.625c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125v11.25c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V8.625ZM16.5 4.125c0-.621.504-1.125 1.125-1.125h2.25C20.496 3 21 3.504 21 4.125v15.75c0 .621-.504 1.125-1.125 1.125h-2.25a1.125 1.125 0 0 1-1.125-1.125V4.125Z"/>
                </svg>
                <span class="text-[9px] font-medium tracking-wider uppercase">Board</span>
            </button>
        </div>
    </nav>

    <script>
        document.body.addEventListener('htmx:afterOnLoad', function() {
            if(navigator.vibrate) navigator.vibrate(5);
        });
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', function() {
                if(navigator.vibrate) navigator.vibrate(5);
                document.querySelectorAll('.nav-item').forEach(b => {
                    b.classList.remove('active');
                    b.classList.add('text-slate-400');
                    b.classList.remove('text-slate-800');
                });
                this.classList.add('active', 'text-slate-800');
                this.classList.remove('text-slate-400');
            });
        });
    </script>
</body>
</html>
