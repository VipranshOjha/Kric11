<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Kric11 Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body { background-color: #0f172a; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent;}
    </style>
</head>
<body class="text-white min-h-screen flex items-center justify-center p-4 selection:bg-sky-500/30">
    <div class="w-full max-w-sm bg-slate-800/80 backdrop-blur-md p-8 rounded-3xl shadow-2xl border border-slate-700/50">
        <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-sky-400 to-indigo-500 text-center mb-1 tracking-tighter">KRIC11</h1>
        <p class="text-center text-xs text-slate-400 font-bold tracking-widest uppercase mb-8">Manager Portal</p>
        
        {% if error %}
            <div class="bg-rose-500/20 text-rose-400 border border-rose-500/50 p-3 rounded-xl text-xs font-bold tracking-wide mb-6 text-center transform animate-pulse">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="{% if is_register %}/web/register{% else %}/web/login{% endif %}" class="space-y-4">
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1 tracking-widest pl-1">USERNAME</label>
                <input type="text" name="username" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white font-bold tracking-wide focus:outline-none focus:border-sky-500 focus:ring-1 focus:ring-sky-500 transition-all shadow-inner">
            </div>
            
            {% if is_register %}
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1 tracking-widest pl-1">EMAIL</label>
                <input type="email" name="email" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white font-bold tracking-wide focus:outline-none focus:border-sky-500 transition-all shadow-inner">
            </div>
            {% endif %}
            
            <div>
                <label class="block text-[10px] font-black text-slate-500 mb-1 tracking-widest pl-1">PASSWORD</label>
                <input type="password" name="password" required class="w-full bg-slate-900/50 border border-slate-700 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-sky-500 transition-all shadow-inner">
            </div>

            <button type="submit" class="w-full bg-sky-500 hover:bg-sky-400 text-slate-900 font-black py-4 rounded-xl shadow-lg shadow-sky-500/30 transition-all uppercase tracking-widest mt-4 active:scale-95">
                {% if is_register %}CREATE ACCOUNT{% else %}SECURE LOGIN{% endif %}
            </button>
        </form>

        <div class="mt-8 text-center text-xs text-slate-400 font-medium">
            {% if is_register %}
                Already drafting? <a href="/web/login" class="text-sky-400 font-bold hover:text-sky-300 transition-colors">Sign In</a>
            {% else %}
                New manager? <a href="/web/login?register=true" class="text-sky-400 font-bold hover:text-sky-300 transition-colors">Start Draft</a>
            {% endif %}
        </div>
    </div>
</body>
</html>
